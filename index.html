<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clarity — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Syne (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <!-- ===================== MAIN CONTAINER ===================== -->
  <main class="app-shell">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo-mark" aria-hidden="true">◈</span>
        <h1 class="app-title">Clarity</h1>
      </div>
      <div class="task-counter" id="taskCounter" title="Active tasks remaining">
        <span id="counterNum">0</span>
        <span class="counter-label">left</span>
      </div>
    </header>

    <!-- ── Filter Tabs ── -->
    <nav class="filter-tabs" role="tablist" aria-label="Task filter">
      <button class="tab active" data-filter="all"    role="tab" aria-selected="true">All</button>
      <button class="tab"        data-filter="active" role="tab" aria-selected="false">Active</button>
      <button class="tab"        data-filter="done"   role="tab" aria-selected="false">Done</button>
    </nav>

    <!-- ── Input Area ── -->
    <div class="input-wrapper">
      <span class="input-icon" aria-hidden="true">+</span>
      <input
        type="text"
        id="taskInput"
        class="task-input"
        placeholder="What needs to be done?"
        autocomplete="off"
        aria-label="New task input"
        maxlength="120"
      />
      <button class="add-btn" id="addBtn" aria-label="Add task">
        <span class="add-btn-inner">Add</span>
      </button>
    </div>

    <!-- ── Task List ── -->
    <section class="task-list-wrapper" aria-label="Task list">
      <ul class="task-list" id="taskList" role="list">
        <!-- Tasks are injected here by JS -->
      </ul>
      <!-- Empty state -->
      <div class="empty-state" id="emptyState" aria-live="polite">
        <span class="empty-icon" aria-hidden="true">✦</span>
        <p>Your slate is clear.</p>
        <small>Add something to get started.</small>
      </div>
    </section>

    <!-- ── Footer Actions ── -->
    <footer class="app-footer">
      <span class="footer-count" id="footerCount">0 tasks total</span>
      <button class="clear-btn" id="clearBtn" aria-label="Clear all completed tasks">
        Clear completed
      </button>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
